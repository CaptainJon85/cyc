<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Count Your Carbon V2 — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --canvas:#e9e6e0;
  --paper:#ffffff;
  --ink:#28281f;
  --ink-soft:#6f6e64;
  --ink-faint:#a4a299;
  --line:#d8d4cb;
  --line-soft:#e7e4dc;
  --block:#efece5;
  --block-2:#e4e0d7;
  --accent:oklch(0.60 0.11 152);
  --accent-deep:oklch(0.50 0.10 152);
  --accent-soft:oklch(0.93 0.035 152);
  --accent-mid:oklch(0.78 0.08 152);
  --warn:oklch(0.74 0.12 70);
  --warn-soft:oklch(0.94 0.05 70);
  --sky:oklch(0.74 0.07 230);
  --sans:'Figtree',system-ui,sans-serif;
  --mono:'Spline Sans Mono','SFMono-Regular',monospace;
  --r:10px;
  --shadow:0 1px 2px rgba(40,40,31,.06),0 8px 24px -12px rgba(40,40,31,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--canvas);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
#root{height:100vh;}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:264px 1fr;height:100vh;}
.nav{
  background:#f4f1ec;border-right:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0;
}
.nav__brand{padding:18px 20px 14px;border-bottom:1px solid var(--line-soft);}
.nav__logo{display:flex;align-items:center;gap:10px;}
.nav__mark{width:26px;height:26px;border-radius:7px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;}
.nav__title{font-weight:700;font-size:14px;letter-spacing:-.01em;line-height:1.2;}
.nav__sub{font-size:11px;color:var(--ink-soft);font-family:var(--mono);margin-top:4px;}
.nav__scroll{overflow-y:auto;padding:10px 10px 30px;flex:1;min-height:0;}
.nav__group{margin-top:14px;}
.nav__grouplabel{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:4px 10px;display:flex;align-items:center;gap:8px;}
.nav__grouplabel::after{content:"";flex:1;height:1px;background:var(--line-soft);}
.nav__item{
  display:flex;align-items:center;gap:9px;width:100%;border:0;background:none;
  text-align:left;font-family:var(--sans);font-size:13px;color:var(--ink);
  padding:7px 10px;border-radius:7px;cursor:pointer;line-height:1.2;
}
.nav__item:hover{background:#ece8e1;}
.nav__item--on{background:var(--accent-soft);color:var(--accent-deep);font-weight:600;}
.nav__num{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);min-width:18px;}
.nav__item--on .nav__num{color:var(--accent);}

/* ---------- Main ---------- */
.main{display:flex;flex-direction:column;min-width:0;min-height:0;}
.topbar{
  height:56px;flex:0 0 56px;border-bottom:1px solid var(--line);
  background:#f4f1ec;display:flex;align-items:center;gap:14px;padding:0 18px;
}
.topbar__crumb{font-size:12px;color:var(--ink-soft);font-family:var(--mono);}
.topbar__title{font-weight:700;font-size:15px;letter-spacing:-.01em;}
.topbar__spacer{flex:1;}
.tabs{display:flex;gap:3px;background:#e7e3db;padding:3px;border-radius:8px;}
.tab{
  border:0;background:none;font-family:var(--sans);font-size:12px;color:var(--ink-soft);
  padding:5px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;font-weight:500;
}
.tab--on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);font-weight:600;}
.seg{display:flex;gap:2px;background:#e7e3db;padding:3px;border-radius:8px;}
.seg button{border:0;background:none;cursor:pointer;padding:5px 9px;border-radius:6px;color:var(--ink-soft);display:grid;place-items:center;}
.seg button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.navbtns{display:flex;gap:6px;}
.navbtns button{
  width:30px;height:30px;border:1px solid var(--line);background:var(--paper);border-radius:7px;
  cursor:pointer;color:var(--ink-soft);display:grid;place-items:center;
}
.navbtns button:hover{border-color:var(--accent);color:var(--accent-deep);}
.navbtns button:disabled{opacity:.4;cursor:default;}

.canvas{flex:1;min-height:0;overflow:auto;padding:30px;display:flex;justify-content:center;align-items:flex-start;}
.canvas--mobile{padding:34px;}

/* ---------- Browser chrome wrapper ---------- */
.frame{width:1140px;max-width:100%;background:var(--paper);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;}
.frame__bar{height:38px;background:#f1eee8;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:7px;padding:0 14px;}
.dot{width:10px;height:10px;border-radius:50%;background:#d6d2c8;}
.frame__url{margin-left:10px;flex:1;height:22px;background:var(--paper);border:1px solid var(--line-soft);border-radius:11px;display:flex;align-items:center;padding:0 12px;font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
.frame__body{padding:0;}

/* ---------- Phone frame ---------- */
.phone{width:380px;background:#1c1c17;border-radius:42px;padding:11px;box-shadow:var(--shadow);}
.phone__screen{background:var(--paper);border-radius:32px;overflow:hidden;position:relative;}
.phone__notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:26px;background:#1c1c17;border-radius:0 0 16px 16px;z-index:5;}
.phone__status{height:42px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 6px;font-size:12px;font-weight:600;color:var(--ink);}
.phone__body{max-height:720px;overflow-y:auto;}

/* ---------- Wireframe primitives ---------- */
.wf{padding:26px 30px;}
.row{display:flex;}
.col{display:flex;flex-direction:column;}
.gap6{gap:6px;}.gap8{gap:8px;}.gap10{gap:10px;}.gap12{gap:12px;}.gap14{gap:14px;}.gap16{gap:16px;}.gap20{gap:20px;}.gap24{gap:24px;}
.wrap{flex-wrap:wrap;}
.ac{align-items:center;}.as{align-items:flex-start;}.ae{align-items:flex-end;}
.jc{justify-content:center;}.jb{justify-content:space-between;}.je{justify-content:flex-end;}
.f1{flex:1;}.grow{flex:1;}

.h1{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1;}
.h2{font-size:18px;font-weight:700;letter-spacing:-.01em;}
.h3{font-size:15px;font-weight:700;}
.lead{font-size:14px;color:var(--ink-soft);line-height:1.5;}
.txt{font-size:13px;color:var(--ink);line-height:1.5;}
.muted{color:var(--ink-soft);}
.faint{color:var(--ink-faint);}
.sm{font-size:12px;}
.xs{font-size:11px;}
.mono{font-family:var(--mono);}
.center{text-align:center;}
.up{text-transform:uppercase;letter-spacing:.1em;font-size:10.5px;font-weight:700;color:var(--ink-faint);font-family:var(--mono);}

/* requirement ref badge */
.ref{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent-deep);background:var(--accent-soft);border-radius:5px;padding:2px 6px;letter-spacing:.02em;white-space:nowrap;}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:18px;}
.card--soft{background:#faf9f6;}
.card--ghost{background:#faf9f6;border:1px dashed var(--line);}

.box{background:var(--block);border:1px solid var(--line-soft);border-radius:8px;}
.line{height:1px;background:var(--line-soft);width:100%;}
.vline{width:1px;background:var(--line-soft);align-self:stretch;}

/* placeholder image/area */
.ph{
  background:
    repeating-linear-gradient(135deg,transparent 0 9px,rgba(40,40,31,.045) 9px 10px),
    var(--block);
  border:1px dashed var(--line);border-radius:8px;
  display:grid;place-items:center;color:var(--ink-faint);font-family:var(--mono);font-size:11px;text-align:center;padding:8px;
}

/* form field */
.field{display:flex;flex-direction:column;gap:6px;}
.flabel{font-size:12px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
.req{color:var(--warn);font-weight:700;}
.input{height:38px;border:1px solid var(--line);border-radius:8px;background:var(--paper);display:flex;align-items:center;padding:0 12px;font-size:13px;color:var(--ink-soft);}
.input--filled{color:var(--ink);}
.input--ta{height:auto;min-height:74px;align-items:flex-start;padding:10px 12px;}
.input--err{border-color:var(--warn);background:var(--warn-soft);}
.input--sel{display:flex;justify-content:space-between;}
.fhint{font-size:11px;color:var(--ink-faint);}
.ferr{font-size:11px;color:oklch(0.55 0.13 40);display:flex;align-items:center;gap:5px;}

/* calculator question blocks */
.qblock{padding:15px 0;border-bottom:1px solid var(--line-soft);}
.qblock:last-child{border-bottom:0;}
.qnum{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent-deep);background:var(--accent-soft);border-radius:6px;padding:4px 7px;min-width:36px;text-align:center;flex:0 0 auto;align-self:flex-start;}
.qtext{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;}
.qtip{font-size:11.5px;color:var(--ink-soft);line-height:1.5;background:#faf9f6;border:1px solid var(--line-soft);border-left:2px solid var(--accent-mid);padding:7px 11px;border-radius:0 7px 7px 0;}
.subhead{display:flex;align-items:center;gap:10px;padding:8px 0 4px;}
.subhead b{font-size:14px;letter-spacing:-.01em;white-space:nowrap;}
.subhead::after{content:"";flex:1;height:1px;background:var(--line-soft);}
.scopetag{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:var(--block-2);color:var(--ink-soft);white-space:nowrap;}
.scopetag--1{background:oklch(0.93 0.045 70);color:oklch(0.5 0.1 60);}
.scopetag--2{background:oklch(0.93 0.045 230);color:oklch(0.44 0.09 230);}
.scopetag--3{background:var(--accent-soft);color:var(--accent-deep);}
.yesno{display:inline-flex;gap:2px;background:#e7e3db;padding:3px;border-radius:8px;width:fit-content;}
.yesno__o{font-size:12px;font-weight:600;color:var(--ink-soft);padding:6px 18px;border-radius:6px;}
.yesno__o.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.tbl td .field,.tbl td .input{width:100%;}
.tbl td .input{height:34px;}

/* buttons */
.btn{
  height:38px;border-radius:8px;border:1px solid var(--line);background:var(--paper);
  font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink);
  padding:0 16px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;justify-content:center;white-space:nowrap;
}
.btn:hover{border-color:var(--ink-soft);}
.btn--primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn--primary:hover{background:var(--accent-deep);border-color:var(--accent-deep);}
.btn--ghost{background:none;border-color:transparent;color:var(--ink-soft);}
.btn--ghost:hover{background:#efece5;border-color:transparent;}
.btn--sm{height:31px;font-size:12px;padding:0 12px;border-radius:7px;}
.btn--full{width:100%;}

/* chips / tags / status */
.chip{font-size:12px;border:1px solid var(--line);background:var(--paper);border-radius:20px;padding:5px 11px;color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.chip--on{background:var(--accent-soft);border-color:var(--accent-mid);color:var(--accent-deep);font-weight:600;}
.tag{font-size:11px;font-weight:600;border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;gap:5px;}
.tag--green{background:var(--accent-soft);color:var(--accent-deep);}
.tag--amber{background:var(--warn-soft);color:oklch(0.5 0.12 60);}
.tag--grey{background:var(--block-2);color:var(--ink-soft);}
.tag--sky{background:oklch(0.93 0.04 230);color:oklch(0.45 0.09 230);}
.dotind{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* progress steps */
.steps{display:flex;align-items:center;gap:0;}
.step{display:flex;align-items:center;gap:9px;}
.step__n{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;border:1.5px solid var(--line);color:var(--ink-faint);background:var(--paper);}
.step__l{font-size:12px;color:var(--ink-faint);font-weight:600;white-space:nowrap;}
.step--done .step__n{background:var(--accent);border-color:var(--accent);color:#fff;}
.step--done .step__l{color:var(--ink);}
.step--on .step__n{border-color:var(--accent);color:var(--accent-deep);background:var(--accent-soft);}
.step--on .step__l{color:var(--accent-deep);}
.step__bar{width:34px;height:2px;background:var(--line);margin:0 6px;}
.step--done+.step .step__bar,.step--done .step__bar{background:var(--accent);}

/* progress bar */
.pbar{height:8px;background:var(--block-2);border-radius:5px;overflow:hidden;}
.pbar__fill{height:100%;background:var(--accent);border-radius:5px;}

/* bars / chart */
.bars{display:flex;flex-direction:column;gap:11px;}
.barrow{display:grid;grid-template-columns:130px 1fr 56px;align-items:center;gap:12px;}
.bartrack{height:18px;background:var(--block);border-radius:4px;overflow:hidden;}
.barfill{height:100%;border-radius:4px;}
.barval{font-family:var(--mono);font-size:12px;text-align:right;color:var(--ink);}
.cbars{display:flex;align-items:flex-end;gap:10px;height:150px;}
.cbar{flex:1;background:var(--accent-mid);border-radius:5px 5px 0 0;position:relative;min-width:0;}
.cbar--ghost{background:var(--block-2);}

/* donut */
.donut{width:148px;height:148px;border-radius:50%;display:grid;place-items:center;}
.donut__hole{width:90px;height:90px;border-radius:50%;background:var(--paper);display:grid;place-items:center;text-align:center;}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);font-family:var(--mono);}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line-soft);color:var(--ink);vertical-align:middle;}
.tbl tr:hover td{background:#faf9f6;}
.tbl--zebra tr:nth-child(even) td{background:#faf9f6;}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;}
.legend span{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);}
.swatch{width:11px;height:11px;border-radius:3px;}

/* in-app side rail (admin) */
.rail{width:184px;flex:0 0 184px;border-right:1px solid var(--line-soft);padding:16px 12px;background:#faf9f6;}
.rail__item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;}
.rail__item:not(.rail__item--on):not(.rail__item--dim):hover{background:var(--accent-soft);color:var(--accent-deep);}
.rail__item--dim{cursor:default;}
.rail__item--on{background:var(--paper);color:var(--ink);font-weight:600;border:1px solid var(--line-soft);}
.rail__head{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:4px 10px 8px;font-family:var(--mono);}

/* annotation callout */
.annot{
  border:1px dashed var(--accent-mid);background:color-mix(in srgb,var(--accent-soft) 60%,transparent);
  border-radius:8px;padding:9px 12px;font-size:11.5px;color:var(--accent-deep);
  font-family:var(--mono);line-height:1.45;display:flex;gap:8px;
}
.annot b{color:var(--accent-deep);}

/* app top bar inside screen */
.appbar{height:52px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:14px;padding:0 22px;background:var(--paper);}
.applogo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13.5px;}
.applogo .nav__mark{width:23px;height:23px;font-size:12px;}
.appbar__nav{display:flex;gap:4px;}
.appbar__nav a{font-size:12.5px;color:var(--ink-soft);padding:6px 11px;border-radius:7px;cursor:pointer;}
.appbar__nav a.on{background:var(--accent-soft);color:var(--accent-deep);font-weight:600;}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--block-2);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--ink-soft);}

/* overview map */
.map{display:flex;flex-direction:column;gap:26px;}
.maprow{display:flex;align-items:stretch;gap:14px;flex-wrap:wrap;}
.node{
  border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:13px 15px;min-width:150px;cursor:pointer;
  display:flex;flex-direction:column;gap:5px;position:relative;transition:.12s;
}
.node:hover{border-color:var(--accent);box-shadow:0 4px 14px -6px rgba(40,40,31,.2);transform:translateY(-1px);}
.node__k{font-family:var(--mono);font-size:10px;color:var(--ink-faint);}
.node__t{font-size:13px;font-weight:700;}
.node__d{font-size:11px;color:var(--ink-soft);line-height:1.35;}
.arrow{align-self:center;color:var(--ink-faint);font-size:18px;}
.swimlane{border:1px dashed var(--line);border-radius:12px;padding:16px;}
.swimlane__t{display:flex;align-items:center;gap:8px;margin-bottom:13px;}

.scrolly{max-height:100%;}
::-webkit-scrollbar{width:11px;height:11px;}
::-webkit-scrollbar-thumb{background:#cdc9bf;border-radius:6px;border:3px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:#bcb8ad;background-clip:content-box;}
</style>
</head>
